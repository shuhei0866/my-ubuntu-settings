[ids]

*

[main]

# Command キー(Meta) → command レイヤー（Ctrl ショートカットに変換）
leftmeta = layer(command)
rightmeta = pause

# Option キー(Alt) はそのまま

# command レイヤー: デフォルトで Ctrl 修飾を適用
[command:C]

# Cmd+Q → アプリ終了 (Alt+F4)
q = A-f4

# Cmd+Space → ランチャー (Super+Space)
space = M-space

# Cmd+H → ウィンドウを隠す (Super+H → GNOME minimize)
h = M-h

# Cmd+Tab → アプリ切り替え (swap で Alt+Tab ホールド動作を実現)
tab = swap(command_tab)

# Cmd+左右 → 戻る/進む (Alt+Left/Right)
left = A-left
right = A-right

# Cmd+Tab 用レイヤー: Alt をホールド（Cmd 離すまでスイッチャーが開いたまま）
[command_tab:A]

# Cmd+Ctrl の組み合わせ（composite layer）
[command+control]

# Cmd+Ctrl+Q → 画面ロック
q = command(loginctl lock-session)

# 物理 Ctrl+Tab/Ctrl+Shift+Tab → タブ切替
[control:C]
tab = C-pagedown

[control+shift]
tab = C-pageup

# Cmd+Option の組み合わせ（composite layer）
[command+alt]

# Cmd+Option+左右 → タブ移動 (Ctrl+PageUp/PageDown)
left = C-pageup
right = C-pagedown
