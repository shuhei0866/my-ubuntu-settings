# 3本指スワイプ: ワークスペース切り替え（Mac風）
gesture swipe left 3 xdotool key ctrl+Right
gesture swipe right 3 xdotool key ctrl+Left

# 3本指スワイプ上: ワークスペース一覧（アクティビティ）
gesture swipe up 3 xdotool key super+F12

# 4本指スワイプ: ブラウザの戻る/進む
gesture swipe right 4 xdotool key alt+Left
gesture swipe left 4 xdotool key alt+Right
